<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - RaMa Proyect Master</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-4">
                <img src="logo.png" alt="RaMa Logo"
                    style="width: 72px; height: 72px; object-fit: contain; margin-bottom: 12px; border-radius: 12px; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <h3 class="fw-bold">RaMa Proyect Master</h3>
                <p class="text-secondary">Inicia sesión para gestionar tus proyectos</p>
            </div>

            <div id="loginError" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label text-secondary fw-semibold">Correo Especial</label>
                    <input type="email" class="form-control form-control-lg" id="email" required
                        placeholder="correo@ejemplo.com">
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label text-secondary fw-semibold">Contraseña</label>
                    </div>
                    <input type="password" class="form-control form-control-lg" id="password" required
                        placeholder="••••••••">
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary btn-lg w-100 mb-3">
                    Ingresar
                </button>
            </form>
            <div class="text-center text-secondary small">
                Cuentas de Prueba:<br>
                Administrador: admin@example.com | admin123<br>
                Usuario: alice@example.com | user123
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
