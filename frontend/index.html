<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ProjectMaster</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-4">
                <i class="fa-solid fa-layer-group text-primary fs-1 mb-2"></i>
                <h3 class="fw-bold">ProjectMaster</h3>
                <p class="text-secondary">Sign in to manage your projects</p>
            </div>
            
            <div id="loginError" class="alert alert-danger d-none" role="alert"></div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label text-secondary fw-semibold">Email address</label>
                    <input type="email" class="form-control form-control-lg" id="email" required placeholder="name@example.com">
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label text-secondary fw-semibold">Password</label>
                    </div>
                    <input type="password" class="form-control form-control-lg" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary btn-lg w-100 mb-3">
                    Sign In
                </button>
            </form>
            <div class="text-center text-secondary small">
                Demo Auth:<br>
                Admin: admin@example.com | admin123<br>
                User: alice@example.com | user123
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
