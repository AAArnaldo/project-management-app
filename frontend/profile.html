<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - RaMa Proyect Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav id="topNavbar" class="top-navbar"></nav>
            
            <div class="main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold m-0"><i class="fa-solid fa-user-circle text-primary me-2"></i> Mi Perfil</h2>
                </div>

                <div class="row">
                    <div class="col-lg-6">
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-body">
                                <h5 class="fw-bold mb-4">Actualizar Datos</h5>
                                <form id="profileForm">
                                    <div class="mb-3">
                                        <label class="form-label">Nombre Completo</label>
                                        <input type="text" class="form-control" id="profileName" required>
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label">Nueva Contraseña <span class="text-secondary small">(opcional)</span></label>
                                        <input type="password" class="form-control" id="profilePassword" placeholder="Dejar en blanco para no cambiar">
                                    </div>
                                    <button type="submit" class="btn btn-primary" id="btnUpdateProfile">Guardar Cambios</button>
                                    <div id="profileMsg" class="mt-3 small text-success d-none">Perfil actualizado correctamente.</div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
