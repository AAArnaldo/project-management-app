<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details - ProjectMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav id="topNavbar" class="top-navbar"></nav>
            
            <div class="main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <a href="projects.html" class="text-secondary text-decoration-none small mb-2 d-inline-block">
                            <i class="fa-solid fa-arrow-left me-1"></i> Back to Projects
                        </a>
                        <h2 class="fw-bold m-0" id="detailTitle">Loading Project...</h2>
                    </div>
                    <div>
                        <!-- Actions based on role -->
                        <button class="btn btn-outline-danger d-none" id="btnDeleteProject">
                            <i class="fa-solid fa-trash me-1"></i> Delete
                        </button>
                    </div>
                </div>

                <div class="row">
                    <!-- Main Content Column -->
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-body">
                                <div class="d-flex justify-content-between mb-4">
                                    <h5 class="fw-bold mb-0">Project details</h5>
                                    <div>
                                        <span id="detailStatus" class="status-badge"></span>
                                    </div>
                                </div>
                                <p class="text-secondary mb-4" id="detailDescription" style="white-space: pre-wrap;"></p>
                                
                                <hr class="my-4">
                                
                                <form id="updateStatusForm" class="bg-light p-3 rounded">
                                    <h6 class="fw-bold mb-3">Update Status</h6>
                                    <div class="d-flex gap-2">
                                        <select class="form-select w-auto" id="newStatus">
                                            <option value="Pending">Pending</option>
                                            <option value="In Progress">In Progress</option>
                                            <option value="Completed">Completed</option>
                                        </select>
                                        <button type="submit" class="btn btn-primary" id="btnUpdateStatus">Save Status</button>
                                    </div>
                                    <div id="statusUpdateMsg" class="mt-2 small text-success d-none">Status updated successfully!</div>
                                </form>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Sidebar Column -->
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm mb-4 bg-light">
                            <div class="card-body">
                                <h6 class="text-uppercase fw-bold text-secondary text-xs mb-3">Project Metadata</h6>
                                <div class="mb-3">
                                    <div class="text-secondary small">Created By</div>
                                    <div class="fw-medium" id="detailCreator"></div>
                                </div>
                                <div>
                                    <div class="text-secondary small mb-2">Assigned Team</div>
                                    <ul class="list-unstyled mb-0" id="detailTeam">
                                        <!-- Team members here -->
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/project_detail.js"></script>
</body>
</html>
