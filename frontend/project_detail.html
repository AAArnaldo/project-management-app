<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Proyecto - RaMa Proyect Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav id="topNavbar" class="top-navbar"></nav>
            
            <div class="main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <a href="projects.html" class="text-secondary text-decoration-none small mb-2 d-inline-block">
                            <i class="fa-solid fa-arrow-left me-1"></i> Volver a Proyectos
                        </a>
                        <h2 class="fw-bold m-0" id="detailTitle">Cargando Proyecto...</h2>
                    </div>
                    <div>
                        <button class="btn btn-outline-danger d-none" id="btnDeleteProject">
                            <i class="fa-solid fa-trash me-1"></i> Eliminar
                        </button>
                    </div>
                </div>

                <div class="row">
                    <!-- Main Content Column -->
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-body">
                                <div class="d-flex justify-content-between mb-4">
                                    <h5 class="fw-bold mb-0">Detalles del proyecto</h5>
                                    <div>
                                        <span id="detailStatus" class="status-badge"></span>
                                    </div>
                                </div>
                                <p class="text-secondary mb-3" id="detailDescription" style="white-space: pre-wrap;"></p>
                                
                                <!-- Task Progress -->
                                <div class="mb-3" id="progressSection">
                                    <div class="d-flex justify-content-between align-items-center mb-1">
                                        <span class="text-secondary small fw-bold">Progreso de Tareas</span>
                                        <span class="small fw-bold" id="progressLabel">0%</span>
                                    </div>
                                    <div class="task-progress-bar">
                                        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                                    </div>
                                    <div class="text-secondary small mt-1" id="progressDetail">0 / 0 tareas completadas</div>
                                </div>
                                
                                <hr class="my-4">
                                
                                <form id="updateStatusForm" class="bg-light p-3 rounded">
                                    <h6 class="fw-bold mb-3">Actualizar Estado</h6>
                                    <div class="d-flex gap-2">
                                        <select class="form-select w-auto" id="newStatus">
                                            <option value="Pending">Pendiente</option>
                                            <option value="In Progress">En Progreso</option>
                                            <option value="Completed">Completado</option>
                                        </select>
                                        <button type="submit" class="btn btn-primary" id="btnUpdateStatus">Guardar Estado</button>
                                    </div>
                                    <div id="statusUpdateMsg" class="mt-2 small text-success d-none">¡Estado actualizado exitosamente!</div>
                                </form>

                                <!-- Tabs for Tasks and Comments -->
                                <ul class="nav nav-tabs mt-4" id="projectTabs" role="tablist">
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link active text-dark fw-bold" id="tasks-tab" data-bs-toggle="tab" data-bs-target="#tasks" type="button" role="tab" aria-controls="tasks" aria-selected="true"><i class="fa-solid fa-list-check me-1"></i> Tareas</button>
                                    </li>
                                    <li class="nav-item" role="presentation">
                                        <button class="nav-link text-dark fw-bold" id="comments-tab" data-bs-toggle="tab" data-bs-target="#comments" type="button" role="tab" aria-controls="comments" aria-selected="false"><i class="fa-regular fa-comments me-1"></i> Comentarios</button>
                                    </li>
                                </ul>
                                <div class="tab-content border border-top-0 rounded-bottom p-3 bg-white" id="projectTabsContent" style="min-height: 250px;">
                                    <!-- Tasks Tab -->
                                    <div class="tab-pane fade show active" id="tasks" role="tabpanel" aria-labelledby="tasks-tab">
                                        <form id="taskForm" class="mb-3">
                                            <div class="d-flex gap-2 mb-2">
                                                <input type="text" id="newTaskTitle" class="form-control" placeholder="Nueva tarea..." required>
                                                <button type="submit" class="btn btn-primary" title="Agregar tarea"><i class="fa-solid fa-plus"></i></button>
                                            </div>
                                            <div class="d-flex gap-2">
                                                <input type="date" id="newTaskDueDate" class="form-control form-control-sm" style="max-width: 200px;">
                                                <label class="form-label text-secondary small mb-0 d-flex align-items-center" for="newTaskDueDate" style="white-space:nowrap;">Fecha límite (opcional)</label>
                                            </div>
                                        </form>
                                        <ul class="list-group list-group-flush" id="tasksList">
                                            <li class="list-group-item text-center text-secondary small py-4">Cargando tareas...</li>
                                        </ul>
                                    </div>
                                    <!-- Comments Tab -->
                                    <div class="tab-pane fade" id="comments" role="tabpanel" aria-labelledby="comments-tab">
                                        <div id="commentsList" class="mb-3 d-flex flex-column gap-3" style="max-height: 300px; overflow-y: auto;">
                                            <div class="text-center text-secondary small py-4">Cargando comentarios...</div>
                                        </div>
                                        <form id="commentForm" class="d-flex gap-2">
                                            <input type="text" id="newComment" class="form-control" placeholder="Escribe un comentario..." required>
                                            <button type="submit" class="btn btn-primary" title="Enviar"><i class="fa-solid fa-paper-plane"></i></button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Sidebar Column -->
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm mb-4 bg-light">
                            <div class="card-body">
                                <h6 class="text-uppercase fw-bold text-secondary text-xs mb-3">Información Adicional</h6>
                                <div class="mb-3">
                                    <div class="text-secondary small">Creado Por</div>
                                    <div class="fw-medium" id="detailCreator"></div>
                                </div>
                                <div>
                                    <div class="text-secondary small mb-2">Equipo Asignado</div>
                                    <ul class="list-unstyled mb-0" id="detailTeam">
                                        <!-- Team members here -->
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/project_detail.js"></script>
</body>
</html>
