<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos - RaMa Proyect Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav id="topNavbar" class="top-navbar"></nav>
            
            <div class="main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold m-0"><i class="fa-solid fa-folder-open text-primary me-2"></i> Proyectos</h2>
                    <button class="btn btn-primary" id="btnCreateProject" data-bs-toggle="modal" data-bs-target="#projectModal" style="display: none;">
                        <i class="fa-solid fa-plus me-1"></i> Nuevo Proyecto
                    </button>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4 mb-2 mb-md-0">
                        <input type="text" id="searchProject" class="form-control" placeholder="Buscar por nombre...">
                    </div>
                    <div class="col-md-3 mb-2 mb-md-0">
                        <select id="filterStatus" class="form-select">
                            <option value="All">Todos los Estados</option>
                            <option value="Pending">Pendiente</option>
                            <option value="In Progress">En Progreso</option>
                            <option value="Completed">Completado</option>
                        </select>
                    </div>
                    <div class="col-md-5 text-md-end">
                        <button class="btn btn-outline-success" id="btnExportCSV">
                            <i class="fa-solid fa-file-csv me-1"></i> Exportar a CSV
                        </button>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Estado</th>
                                        <th>Creado Por</th>
                                        <th>Progreso</th>
                                        <th class="text-end">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="projectsTable">
                                    <tr><td colspan="5" class="text-center py-4">Cargando...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Project Modal -->
    <div class="modal fade" id="projectModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="projectForm">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold">Crear Nuevo Proyecto</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div id="projectError" class="alert alert-danger d-none"></div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre del Proyecto</label>
                            <input type="text" class="form-control" id="projectName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Descripción</label>
                            <textarea class="form-control" id="projectDescription" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Estado</label>
                            <select class="form-select" id="projectStatus">
                                <option value="Pending">Pendiente</option>
                                <option value="In Progress">En Progreso</option>
                                <option value="Completed">Completado</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Asignar Usuarios (Mantén Ctrl para múltiple)</label>
                            <select multiple class="form-select" id="projectUsers">
                                <option disabled>Cargando usuarios...</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary" id="btnSaveProject">Crear Proyecto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/projects.js"></script>
</body>
</html>
